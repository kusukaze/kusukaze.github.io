<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字谜题求解器</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .cross-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
        }

        .square {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            background-color: #fff;
        }

        .center {
            top: 70px;
            left: 70px;
            background-color: #e8f4fd;
        }

        .top {
            top: 0;
            left: 70px;
        }

        .bottom {
            bottom: 0;
            left: 70px;
        }

        .left {
            top: 70px;
            left: 0;
        }

        .right {
            top: 70px;
            right: 0;
        }

        .input-display {
            outline: none;
            border: none;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 24px;
            background: transparent;
            cursor: pointer;
        }

        .buttons {
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .results {
            margin-top: 15px;
            min-height: 25px;
        }

        .results-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .result-item {
            padding: 5px 10px;
            background-color: #e9ecef;
            border-radius: 3px;
            font-size: 14px;
        }

        .current-index {
            margin: 0 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>汉字谜题求解器</h2>

    <div class="cross-container">
        <div class="square top">
            <input type="text" class="input-display" id="topInput" maxlength="1" data-direction="top">
        </div>
        <div class="square bottom">
            <input type="text" class="input-display" id="bottomInput" maxlength="1" data-direction="bottom">
        </div>
        <div class="square left">
            <input type="text" class="input-display" id="leftInput" maxlength="1" data-direction="left">
        </div>
        <div class="square right">
            <input type="text" class="input-display" id="rightInput" maxlength="1" data-direction="right">
        </div>
        <div class="square center" id="centerResult">
            ?
        </div>
    </div>

    <div class="buttons">
        <button id="solveBtn">求解</button>
        <button id="prevBtn" disabled>上一个</button>
        <span class="current-index" id="currentIndex">0/0</span>
        <button id="nextBtn" disabled>下一个</button>
    </div>

    <div class="results" id="resultsDisplay"></div>
</div>

        // 高效的四集合交集函数
        function intersectFourSets(set1, set2, set3, set4) {
            if (set1.size === 0 || set2.size === 0 || set3.size === 0 || set4.size === 0) {
                return [];
            }

            // 选择最小的集合作为基础，减少迭代次数
            const sets = [set1, set2, set3, set4].filter(s => s.size > 0);
            sets.sort((a, b) => a.size - b.size);
            const smallest = sets[0];
            const others = sets.slice(1);

            const result = [];
            for (const item of smallest) {
                if (others.every(set => set.has(item))) {
                    result.push(item);
                }
            }
            return result;
        }

        // 初始化函数
        function initializeWithWords(words) {
            if (!Array.isArray(words)) {
                console.error('词语数据格式错误，需要数组格式');
                return;
            }

            dict1 = {};
            dict2 = {};

            words.forEach(word => {
                if (typeof word === 'string' && word.length === 2) {
                    const firstChar = word[0];
                    const secondChar = word[1];

                    // 构建第一个字典 - 使用Set
                    if (!dict1[firstChar]) {
                        dict1[firstChar] = new Set();
                    }
                    dict1[firstChar].add(secondChar);

                    // 特殊处理：如果第二个字是々，则也添加第一个字
                    if (secondChar === '々') {
                        dict1[firstChar].add(firstChar);
                    }

                    // 构建第二个字典 - 使用Set
                    if (!dict2[secondChar]) {
                        dict2[secondChar] = new Set();
                    }
                    dict2[secondChar].add(firstChar);

                    // 特殊处理：如果第二个字是々，则第一个字也可以作为第二个字的key
                    if (secondChar === '々') {
                        if (!dict2[firstChar]) {
                            dict2[firstChar] = new Set();
                        }
                        dict2[firstChar].add(firstChar);
                    }
                }
            });

            hasValidData = true;
            console.log('词语字典加载成功，共', words.length, '个词语');
        }

        // 如果没有正确加载，提供备用数据（包含々的例子）
        if (typeof puzzleWords === 'undefined') {
            console.warn('字典加载错误，使用示例数据');
            initializeWithWords(sampleWords);
        } else {
            initializeWithWords(puzzleWords);
        }

        // 点击输入框时全选内容
        function setupInputEvents() {
            [topInput, bottomInput, leftInput, rightInput].forEach(input => {
                input.addEventListener('click', function() {
                    this.select();
                    currentInput = this;
                    // 更新当前焦点索引
                    currentFocusIndex = inputBoxes.indexOf(this);
                });

                input.addEventListener('focus', function() {
                    this.select();
                    currentInput = this;
                    currentFocusIndex = inputBoxes.indexOf(this);
                });

                input.addEventListener('input', function() {
                    if (this.value.length > 1) {
                        this.value = this.value.slice(0, 1);
                    }
                });

                // 回车键处理
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        solvePuzzle();
                    }
                });
            });
        }

        // 方向键导航
        function setupKeyboardNavigation() {
            document.addEventListener('keydown', function(e) {
                // 只在没有输入框聚焦或在输入框内按方向键时处理
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    topInput.focus();
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    bottomInput.focus();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    leftInput.focus();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    rightInput.focus();
                } else if (e.key === 'Enter') {
                    // 如果当前有输入框聚焦，已经在输入框事件中处理了
                    // 如果没有聚焦任何输入框，直接求解
                    if (!currentInput || !document.activeElement.classList.contains('input-display')) {
                        solvePuzzle();
                    }
                }
            });
        }

        // 求解函数 - 性能优化版本
        function solvePuzzle() {
            if (!hasValidData) {
                alert('字典数据未加载，请检查 puzzle_dict.js 文件');
                return;
            }

            const topChar = topInput.value.trim();
            const bottomChar = bottomInput.value.trim();
            const leftChar = leftInput.value.trim();
            const rightChar = rightInput.value.trim();

            // 检查输入
            if (!topChar || !bottomChar || !leftChar || !rightChar) {
                alert('请在四个方向都填写一个汉字！');
                return;
            }

            // 获取四个方向的候选字集合（已经是Set，无需转换）
            const fromLeft = dict1[leftChar] || new Set();
            const fromTop = dict1[topChar] || new Set();
            const fromRight = dict2[rightChar] || new Set();
            const fromBottom = dict2[bottomChar] || new Set();

            // 直接计算四个集合的交集
            const intersection = intersectFourSets(fromLeft, fromTop, fromRight, fromBottom);

            currentResults = intersection;
            currentIndex = 0;

            if (currentResults.length === 0) {
                centerResult.textContent = 'x';
                resultsDisplay.innerHTML = '<p>没有找到匹配的汉字</p>';
                updateNavigationButtons();
            } else {
                centerResult.textContent = currentResults[0];
                displayAllResults();
                updateNavigationButtons();
            }
        }

        // 显示所有结果
        function displayAllResults() {
            let html = `<p>找到 ${currentResults.length} 个结果：</p>`;
            html += '<div class="results-list">';
            currentResults.forEach((char, index) => {
                html += `<span class="result-item">${char}</span>`;
            });
            html += '</div>';
            resultsDisplay.innerHTML = html;
        }

        // 更新导航按钮状态和计数显示
        function updateNavigationButtons() {
            if (currentResults.length === 0) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                currentIndexDisplay.textContent = '0/0';
            } else if (currentResults.length === 1) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                currentIndexDisplay.textContent = '1/1';
            } else {
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === currentResults.length - 1;
                currentIndexDisplay.textContent = `${currentIndex + 1}/${currentResults.length}`;
            }
        }

        // 显示当前结果
        function showCurrentResult() {
            if (currentResults.length > 0) {
                centerResult.textContent = currentResults[currentIndex];
                updateNavigationButtons();
            }
        }

        // 事件监听器
        solveBtn.addEventListener('click', solvePuzzle);

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                showCurrentResult();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < currentResults.length - 1) {
                currentIndex++;
                showCurrentResult();
            }
        });

        // 初始化
        window.addEventListener('load', function() {
            // 清空所有输入框
            topInput.value = '';
            bottomInput.value = '';
            leftInput.value = '';
            rightInput.value = '';

            // 设置事件
            setupInputEvents();
            setupKeyboardNavigation();

            // 默认聚焦到上方输入框
            topInput.focus();
        });
    </script>
</body>
</html>
