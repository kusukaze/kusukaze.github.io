        // --- 计算浪费的报名费 ---
        function getFee(yearStr, level) {
            const year = parseInt(yearStr.split('.')[0]);
            const month = parseInt(yearStr.split('.')[1]);
            if (year <= 2011) {
                return 350;
            } else if (year <= 2018 || (year === 2019 && month === 7)) {
                return (level === 'n1' || level === 'n2') ? 450 : 350;
            } else {
                return (level === 'n1' || level === 'n2') ? 550 : 450;
            }
        }

        const totalFeeData = jlptData.map(item => {
            const year = item.year;
            const levels = ['n1', 'n2', 'n3', 'n4', 'n5'];
            let totalWasted = 0;
            for (const level of levels) {
                const reg = item[`${level}_reg`];
                const fee = getFee(year, level);
                totalWasted += reg * fee;
            }
            return {
                year: year,
                total: totalWasted
            };
        });

        const wastedFeeData = jlptData.map(item => {
            const year = item.year;
            const levels = ['n1', 'n2', 'n3', 'n4', 'n5'];
            let totalWasted = 0;
            for (const level of levels) {
                const reg = item[`${level}_reg`];
                const att = item[`${level}_att`];
                const fee = getFee(year, level);
                totalWasted += (reg - att) * fee;
            }
            return {
                year: year,
                wasted: totalWasted
            };
        });

        // --- Tab切换功能 ---
        function openTab(evt, tabName) {
            const tabContents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove("active");
            }

            const tabButtons = document.getElementsByClassName("tab-button");
            for (let i = 0; i < tabButtons.length; i++) {
                tabButtons[i].classList.remove("active");
            }

            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");

            // 销毁旧图表以避免内存泄漏
            if (window.currentChart) {
                window.currentChart.destroy();
            }

            // 重新绘制当前tab的图表
            if (tabName === 'registration') {
                renderRegistrationChart();
            } else if (tabName === 'attendance') {
                renderAttendanceChart();
            } else if (tabName === 'total') {
                renderTotalChart();
            } else if (tabName === 'increase') {
                renderIncreaseChart();
            } else if (tabName === 'ratio') {
                renderRatioChart();
            } else if (tabName === 'totalFee') {
                renderTotalFeeChart();
            } else if (tabName === 'wastedFee') {
                renderWastedFeeChart();
            }
        }
